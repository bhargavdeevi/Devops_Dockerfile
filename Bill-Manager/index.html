<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bill Management Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1e293b;
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #0f172a;
    }

    .header p {
      color: #64748b;
      margin-top: 6px;
    }

    .date-box {
      background: white;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      font-size: 14px;
      color: #475569;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 18px;
      box-shadow: 0 5px 18px rgba(15, 23, 42, 0.06);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h3 {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 12px;
    }

    .card .amount {
      font-size: 28px;
      font-weight: 700;
    }

    .income {
      color: #16a34a;
    }

    .expense {
      color: #dc2626;
    }

    .pending {
      color: #d97706;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 25px;
    }

    .panel {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 5px 18px rgba(15, 23, 42, 0.06);
    }

    .panel h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #0f172a;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input,
    select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #dbe3ef;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table thead {
      background: #f8fafc;
    }

    table th,
    table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    table th {
      color: #64748b;
      font-weight: 600;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .paid {
      background: #dcfce7;
      color: #166534;
    }

    .unpaid {
      background: #fee2e2;
      color: #991b1b;
    }

    .delete-btn {
      background: #ef4444;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 30px 0;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <div>
        <h1>Bill Management Platform</h1>
        <p>Track bills, payments, and expenses easily</p>
      </div>

      <div class="date-box" id="currentDate"></div>
    </div>

    <div class="dashboard">

      <div class="card">
        <h3>Total Bills</h3>
        <div class="amount" id="totalBills">0</div>
      </div>

      <div class="card">
        <h3>Total Income</h3>
        <div class="amount income" id="totalIncome">₹0</div>
      </div>

      <div class="card">
        <h3>Total Expenses</h3>
        <div class="amount expense" id="totalExpense">₹0</div>
      </div>

      <div class="card">
        <h3>Pending Bills</h3>
        <div class="amount pending" id="pendingBills">0</div>
      </div>

    </div>

    <div class="layout">

      <div class="panel">
        <h2>Add New Bill</h2>

        <form id="billForm">

          <input
            type="text"
            id="customerName"
            placeholder="Customer Name"
            required
          >

          <input
            type="text"
            id="billTitle"
            placeholder="Bill Title"
            required
          >

          <input
            type="number"
            id="billAmount"
            placeholder="Amount"
            required
          >

          <select id="billStatus">
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
          </select>

          <button type="submit">Add Bill</button>

        </form>
      </div>

      <div class="panel">

        <h2>Bill Records</h2>

        <div class="table-container">

          <table>

            <thead>
              <tr>
                <th>Customer</th>
                <th>Bill</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="billTableBody">
              <tr>
                <td colspan="5" class="empty">
                  No bills added yet
                </td>
              </tr>
            </tbody>

          </table>

        </div>
      </div>

    </div>

  </div>

  <script>

    const billForm = document.getElementById('billForm');
    const billTableBody = document.getElementById('billTableBody');

    const totalBills = document.getElementById('totalBills');
    const totalIncome = document.getElementById('totalIncome');
    const totalExpense = document.getElementById('totalExpense');
    const pendingBills = document.getElementById('pendingBills');

    let bills = JSON.parse(localStorage.getItem('bills')) || [];

    function updateDate() {
      const date = new Date();

      document.getElementById('currentDate').innerText =
        date.toDateString();
    }

    updateDate();

    function saveBills() {
      localStorage.setItem('bills', JSON.stringify(bills));
    }

    function renderBills() {

      billTableBody.innerHTML = '';

      if (bills.length === 0) {
        billTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="empty">
              No bills added yet
            </td>
          </tr>
        `;
      }

      let income = 0;
      let expense = 0;
      let pending = 0;

      bills.forEach((bill, index) => {

        if (bill.status === 'Paid') {
          income += bill.amount;
        } else {
          expense += bill.amount;
          pending++;
        }

        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${bill.customer}</td>
          <td>${bill.title}</td>
          <td>₹${bill.amount}</td>

          <td>
            <span class="status ${bill.status === 'Paid' ? 'paid' : 'unpaid'}">
              ${bill.status}
            </span>
          </td>

          <td>
            <button
              class="delete-btn"
              onclick="deleteBill(${index})"
            >
              Delete
            </button>
          </td>
        `;

        billTableBody.appendChild(row);

      });

      totalBills.innerText = bills.length;
      totalIncome.innerText = `₹${income}`;
      totalExpense.innerText = `₹${expense}`;
      pendingBills.innerText = pending;
    }

    billForm.addEventListener('submit', (e) => {

      e.preventDefault();

      const customer =
        document.getElementById('customerName').value;

      const title =
        document.getElementById('billTitle').value;

      const amount =
        parseFloat(document.getElementById('billAmount').value);

      const status =
        document.getElementById('billStatus').value;

      const bill = {
        customer,
        title,
        amount,
        status
      };

      bills.push(bill);

      saveBills();
      renderBills();

      billForm.reset();

    });

    function deleteBill(index) {

      bills.splice(index, 1);

      saveBills();
      renderBills();

    }

    renderBills();

  </script>

</body>
</html>
